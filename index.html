<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="stylesheet" href="style.css">

    <!-- tailwind + daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="login-container card w-96 bg-base-100 shadow-sm m-auto flex-col items-center justify-center my-6 py-6">
        <!-- login header -->
        <header class="flex-col items-center justify-center text-center">
            <div class="flex items-center justify-center mb-4">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
            <p class="text-[#64748B] mt-1">Sign in to manage your issues</p>
        </header>
        <!-- login body -->
        <section class="mt-4">
            <fieldset class="fieldset w-xs">

            <label class="label font-medium text-black text-[16px]">Username</label>
            <input type="email" class="input" placeholder="Enter Username" />
            <small class="text-[14px] text-[#4A00FF] mb-4">Defualt: admin</small>

            <label class="label font-medium text-black text-[16px]">Password</label>
            <input type="password" class="input" placeholder="Enter Password" />
            <small class="text-[14px] text-[#4A00FF]">Defualt: admin123</small>

            <button class="btn btn-primary mt-4">Sign In</button>
            </fieldset>
        </section>
        <span class="my-2">OR</span>
        <!-- login footer -->
        <section>
            <h4 class="text-[#64748B mb-4 text-[14px]]">Demo Credentials:</h4>
            <p><span class="font-bold">Username:</span> admin</p>
            <p><span class="font-bold">Password:</span> admin123</p>
        </section>
    </main>
</body>
</html>
